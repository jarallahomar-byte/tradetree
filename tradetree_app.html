<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>TradeTree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════ */
:root {
  /* Brand */
  --forest:      #1E4D3A;
  --sage:        #A8C3B0;

  /* Status colors */
  --green:       #16A34A;
  --green-light: #DCFCE7;
  --red:         #DC2626;
  --red-light:   #FEE2E2;
  --amber:       #F59E0B;
  --amber-light: #FEF3C7;
  --blue:        #2563EB;

  /* Light mode surface */
  --bg:          #F8F7F3;
  --card:        #FFFFFF;
  --border:      #EAEAEA;
  --border2:     #F2F2F0;

  /* Text */
  --text:        #1F1F1F;
  --text2:       #6B7280;
  --text3:       #9CA3AF;

  --primary:     #1E4D3A;
  --primary-bg:  #EEF3F0;

  --radius:      16px;
  --radius-sm:   12px;
  --radius-xs:   8px;

  --shadow:      0 1px 2px rgba(30,77,58,.04), 0 1px 3px rgba(30,77,58,.06);
  --shadow-md:   0 4px 16px rgba(30,77,58,.08), 0 2px 6px rgba(30,77,58,.05);

  --font:        'Cairo', sans-serif;
  --font-en:     'Inter', sans-serif;

  --nav-h:       60px;
  --bottom-h:    64px;

  /* Typography scale */
  --h1: 32px; --h2: 24px; --h3: 20px; --body: 16px; --small: 14px;
}

[data-theme="dark"] {
  --bg:          #0F172A;
  --card:        #161E2E;
  --border:      #263244;
  --border2:     #1E2940;
  --text:        #FFFFFF;
  --text2:       #94A3B8;
  --text3:       #5C6B82;
  --primary-bg:  rgba(30,77,58,.25);
  --green-light: rgba(22,163,74,.15);
  --red-light:   rgba(220,38,38,.15);
  --amber-light: rgba(245,158,11,.15);
  --shadow:      0 1px 3px rgba(0,0,0,.4);
  --shadow-md:   0 4px 12px rgba(0,0,0,.5);
  --primary:     #2E7D5B;
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════════
   STATIC PREMIUM BACKGROUND (Apple / Stripe / Arc style)
══════════════════════════════════════════ */
body {
  background:
    radial-gradient(circle at top right, rgba(30,77,58,0.10), transparent 42%),
    radial-gradient(circle at bottom left, rgba(22,163,74,0.07), transparent 38%),
    linear-gradient(180deg, #F8F7F3 0%, #F4F4F1 100%);
  background-attachment: fixed;
}

[data-theme="dark"] body {
  background:
    radial-gradient(circle at top right, rgba(30,77,58,0.16), transparent 42%),
    radial-gradient(circle at bottom left, rgba(22,163,74,0.10), transparent 38%),
    linear-gradient(180deg, #0F172A 0%, #111827 100%);
  background-attachment: fixed;
}

/* Glass surfaces over gradient */
[data-theme="light"] #app { background: transparent; }
[data-theme="light"] .card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
[data-theme="light"] #topNav {
  background: rgba(255,255,255,0.90);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
[data-theme="light"] #bottomNav {
  background: rgba(255,255,255,0.90);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
[data-theme="light"] .trade-setup {
  background: rgba(238,243,240,0.88);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

[data-theme="dark"] #app { background: transparent; }
[data-theme="dark"] .card {
  background: rgba(22,30,46,0.82);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
[data-theme="dark"] #topNav {
  background: rgba(15,23,42,0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
[data-theme="dark"] #bottomNav {
  background: rgba(15,23,42,0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

button {
  cursor: pointer;
  font-family: var(--font);
  border: none;
  outline: none;
  background: none;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s, transform .1s;
}
button:active { transform: scale(.97); }
button:focus, button:focus-visible { outline: none; box-shadow: none; }

input, select, textarea {
  font-family: var(--font);
  outline: none;
  border: none;
  background: none;
}

a { text-decoration: none; color: inherit; }

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  background: var(--bg);
}

/* Top Nav */
#topNav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--nav-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
}

.nav-logo {
  font-size: 17px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-logo span { color: var(--text); }

.nav-spacer { flex: 1; }

.nav-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-xs);
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  color: var(--text2);
  border: 1px solid var(--border);
}
.nav-btn:hover { color: var(--primary); border-color: var(--primary); }

/* Market Toggle Pill */
.market-pill {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px;
  gap: 2px;
}
.market-pill button {
  padding: 4px 10px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 600;
  background: transparent;
  color: var(--text2);
  transition: all .2s;
}
.market-pill button.active {
  background: var(--primary);
  color: #fff;
}

/* Page Content */
#page {
  padding: 14px 14px 80px;
  min-height: calc(100vh - var(--nav-h));
}

/* Bottom Nav */
#bottomNav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: var(--bottom-h);
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}

.bnav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 12px;
  border-radius: var(--radius-xs);
  background: transparent;
  color: var(--text3);
  font-size: 10px;
  font-weight: 600;
  min-width: 48px;
  transition: color .2s;
}
.bnav-item i { font-size: 20px; }
.bnav-item.active { color: var(--primary); }
.bnav-item.active i {
  background: var(--primary-bg);
  border-radius: 8px;
  padding: 4px 6px;
}

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px;
  box-shadow: var(--shadow);
}
.card + .card { margin-top: 10px; }

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title i { color: var(--primary); font-size: 15px; }

/* ══════════════════════════════════════════
   MARKET STATUS BAR
══════════════════════════════════════════ */
.market-status {
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  background: var(--card);
}
.status-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(255,255,255,.3);
}
.status-dot.bull { background: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,.15); }
.status-dot.bear { background: var(--red);   box-shadow: 0 0 0 3px rgba(220,38,38,.15); }
.status-dot.neutral { background: var(--amber); box-shadow: 0 0 0 3px rgba(217,119,6,.15); }
.status-label { font-size: 13px; font-weight: 700; }
.status-label.bull { color: var(--green); }
.status-label.bear { color: var(--red); }
.status-label.neutral { color: var(--amber); }
.status-indices {
  margin-right: auto;
  display: flex;
  gap: 8px;
  font-size: 11px;
  font-family: var(--font-en);
  flex-wrap: wrap;
}
.idx-item { display: flex; align-items: center; gap: 3px; color: var(--text2); }
.idx-item .up { color: var(--green); font-weight: 600; }
.idx-item .dn { color: var(--red); font-weight: 600; }

/* ══════════════════════════════════════════
   SEARCH BAR
══════════════════════════════════════════ */
.search-wrap {
  position: relative;
  margin-bottom: 14px;
}
.search-wrap i.icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 18px;
  pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 14px 46px 14px 56px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 15px;
  color: var(--text);
  transition: border-color .2s, box-shadow .2s;
  font-family: var(--font);
}
#searchInput:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(22,163,74,.1);
}
#searchInput::placeholder { color: var(--text3); }
.search-btn {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-xs);
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 700;
}

/* ══════════════════════════════════════════
   STYLE TABS (قصير / متوسط / طويل)
══════════════════════════════════════════ */
.style-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.style-tab {
  padding: 9px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--card);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: all .2s;
}
.style-tab.active {
  border-color: var(--primary);
  background: var(--primary-bg);
}
.style-tab .tab-icon { color: var(--text2); }
.style-tab.active .tab-icon { color: var(--primary); }
.style-tab .tab-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.style-tab.active .tab-name { color: var(--primary); }
.style-tab .tab-sub { font-size: 10px; color: var(--text3); }

/* ══════════════════════════════════════════
   TODAY'S IDEAS
══════════════════════════════════════════ */
.idea-card {
  display: flex;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border2);
  gap: 10px;
  cursor: pointer;
  transition: opacity .15s;
}
.idea-card:last-child { border-bottom: none; padding-bottom: 0; }
.idea-card:first-child { padding-top: 0; }
.idea-card:hover { opacity: .8; }

.idea-ticker {
  width: 42px;
  height: 42px;
  border-radius: var(--radius-xs);
  background: var(--primary-bg);
  color: var(--primary);
  font-size: 11px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: var(--font-en);
  letter-spacing: -.3px;
}
.idea-info { flex: 1; min-width: 0; }
.idea-name { font-size: 13px; font-weight: 700; }
.idea-setup { font-size: 11px; color: var(--text3); margin-top: 1px; }
.idea-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.score-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-en);
}
.score-badge.high { color: var(--green); }
.score-badge.mid  { color: var(--amber); }
.score-badge.low  { color: var(--red); }
.pct-badge {
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-en);
}
.pct-badge.up { color: var(--green); }
.pct-badge.dn { color: var(--red); }

/* ══════════════════════════════════════════
   NEWS STRIP
══════════════════════════════════════════ */
.news-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 9px 0;
  border-bottom: 1px solid var(--border2);
  cursor: pointer;
}
.news-item:last-child { border-bottom: none; }
.news-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--primary);
  flex-shrink: 0;
  margin-top: 6px;
}
.news-text { font-size: 12px; color: var(--text2); line-height: 1.5; flex: 1; }
.news-time { font-size: 10px; color: var(--text3); white-space: nowrap; font-family: var(--font-en); }

/* ══════════════════════════════════════════
   WATCHLIST MINI
══════════════════════════════════════════ */
.wl-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border2);
  cursor: pointer;
  transition: opacity .15s;
}
.wl-item:last-child { border-bottom: none; }
.wl-item:hover { opacity: .8; }
.wl-ticker {
  font-size: 14px;
  font-weight: 800;
  font-family: var(--font-en);
  color: var(--text);
  min-width: 52px;
}
.wl-trend {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.wl-trend.up { background: var(--green); }
.wl-trend.dn { background: var(--red); }
.wl-price { font-size: 13px; font-weight: 600; font-family: var(--font-en); flex: 1; }
.wl-pct { font-size: 12px; font-weight: 700; font-family: var(--font-en); }
.wl-pct.up { color: var(--green); }
.wl-pct.dn { color: var(--red); }
.wl-score { font-size: 11px; font-weight: 600; color: var(--text3); font-family: var(--font-en); }

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  transition: opacity .15s, transform .1s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border);
}
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:hover { opacity: .85; }

/* ══════════════════════════════════════════
   LOADING
══════════════════════════════════════════ */
.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--border2) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.loading-text {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

/* ══════════════════════════════════════════
   STOCK ANALYSIS PAGE
══════════════════════════════════════════ */
.stock-header {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.stock-name-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.stock-ticker-big {
  font-size: 22px;
  font-weight: 800;
  font-family: var(--font-en);
  color: var(--text);
}
.stock-company { font-size: 12px; color: var(--text3); margin-top: 1px; }

.tt-score-circle {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.tt-score-num {
  font-size: 22px;
  font-weight: 800;
  font-family: var(--font-en);
  line-height: 1;
}
.tt-score-label { font-size: 9px; color: var(--text3); font-weight: 600; letter-spacing: .5px; }

.price-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.price-main {
  font-size: 28px;
  font-weight: 800;
  font-family: var(--font-en);
  letter-spacing: -.5px;
}
.price-change {
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-en);
  padding: 2px 8px;
  border-radius: 20px;
}
.price-change.up { background: var(--green-light); color: var(--green); }
.price-change.dn { background: var(--red-light);   color: var(--red); }
.pre-post-badge {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* Range Bar */
.range-section { margin-bottom: 12px; }
.range-label { font-size: 11px; color: var(--text3); font-weight: 600; margin-bottom: 5px; display: flex; justify-content: space-between; }
.range-bar-wrap { position: relative; height: 6px; border-radius: 3px; background: var(--border); }
.range-bar-fill { position: absolute; height: 100%; border-radius: 3px; }
.range-bar-fill.day { background: linear-gradient(90deg, var(--green-light), var(--green)); }
.range-bar-fill.week52 { background: linear-gradient(90deg, #dbeafe, var(--blue)); }
.range-dot {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.range-dot.day { background: var(--green); }
.range-dot.week52 { background: var(--blue); }

/* Stat Grid */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.stat-item {
  background: var(--bg);
  border-radius: var(--radius-xs);
  padding: 9px 10px;
  border: 1px solid var(--border2);
}
.stat-label { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 3px; }
.stat-value { font-size: 13px; font-weight: 700; font-family: var(--font-en); }

/* Trade Setup */
.trade-setup {
  background: var(--primary-bg);
  border: 1.5px solid rgba(22,163,74,.2);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}
.setup-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 11px; display: flex; align-items: center; gap: 5px; }
.setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.setup-item { background: var(--card); border-radius: var(--radius-xs); padding: 9px 11px; border: 1px solid var(--border); }
.setup-key { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 3px; }
.setup-val { font-size: 14px; font-weight: 800; font-family: var(--font-en); }
.setup-val.green { color: var(--green); }
.setup-val.red   { color: var(--red); }
.setup-val.amber { color: var(--amber); }
.setup-item.full { grid-column: 1/-1; display: flex; justify-content: space-between; align-items: center; }

/* Score Bars */
.score-bar-item { margin-bottom: 11px; }
.score-bar-item:last-child { margin-bottom: 0; }
.score-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.score-bar-name { font-size: 12px; font-weight: 600; color: var(--text2); }
.score-bar-val { font-size: 12px; font-weight: 800; font-family: var(--font-en); }
.score-bar-val.high { color: var(--green); }
.score-bar-val.mid  { color: var(--amber); }
.score-bar-val.low  { color: var(--red); }
.score-bar-track { height: 7px; border-radius: 4px; background: var(--border); overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 4px; transition: width .8s ease; }
.score-bar-fill.high { background: var(--green); }
.score-bar-fill.mid  { background: var(--amber); }
.score-bar-fill.low  { background: var(--red); }

/* Final Score */
.final-score {
  background: var(--text);
  color: var(--card);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}
.final-score-num { font-size: 36px; font-weight: 900; font-family: var(--font-en); line-height: 1; }
.final-score-info { flex: 1; }
.final-score-label { font-size: 11px; opacity: .6; font-weight: 600; margin-bottom: 4px; }
.final-score-status { font-size: 14px; font-weight: 700; }
.final-score-meta { font-size: 11px; opacity: .5; margin-top: 2px; }

/* AI Insight */
.ai-insight {
  background: var(--card);
  border: 1px solid var(--border);
  border-right: 3px solid var(--primary);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 10px;
}
.ai-insight-label { font-size: 10px; font-weight: 700; color: var(--primary); letter-spacing: .5px; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.ai-insight-text { font-size: 13px; color: var(--text2); line-height: 1.7; }

/* Analysis Tabs */
.analysis-tabs {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 12px;
  gap: 2px;
}
.analysis-tab {
  flex: 1;
  padding: 8px 4px;
  border-radius: var(--radius-xs);
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  background: transparent;
  text-align: center;
  transition: all .2s;
}
.analysis-tab.active {
  background: var(--primary);
  color: #fff;
}

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.section-title { font-size: 14px; font-weight: 700; color: var(--text); }
.section-link { font-size: 12px; color: var(--primary); font-weight: 600; text-decoration: none; background: none; border: none; }

.tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.tag-green { background: var(--green-light); color: var(--green); }
.tag-red   { background: var(--red-light);   color: var(--red); }
.tag-amber { background: var(--amber-light);  color: var(--amber); }
.tag-gray  { background: var(--bg); color: var(--text3); border: 1px solid var(--border); }

.divider { height: 1px; background: var(--border); margin: 10px 0; }

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--text3);
}
.empty-state i { font-size: 40px; display: block; margin-bottom: 10px; opacity: .4; }
.empty-state p { font-size: 13px; }

.disclaimer {
  font-size: 10px;
  color: var(--text3);
  text-align: center;
  padding: 8px 16px;
  line-height: 1.6;
}

/* Back Button */
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  background: transparent;
  padding: 6px 0;
  margin-bottom: 10px;
}
.back-btn i { font-size: 18px; }
.back-btn:hover { color: var(--primary); }

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@keyframes tickerMove {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@media (min-width: 480px) {
  #app { box-shadow: 0 0 40px rgba(0,0,0,.08); }
  #bottomNav { border-radius: 0; }
}
</style>

<script>
'use strict';
const WORKER_URL='https://tradetree-api.jarallah-omar.workers.dev';
async function workerGet(p,params={}){const q=new URLSearchParams(params).toString();const r=await fetch(WORKER_URL+p+(q?'?'+q:''));if(!r.ok)throw new Error('خطأ في الخادم');return r.json();}

// ── Quotes via Worker ──
async function yfQuote(symbols) {
  const syms=(Array.isArray(symbols)?symbols:[symbols]).filter(Boolean);
  const results=await Promise.all(syms.map(async sym=>{
    try{
      const [q,p]=await Promise.all([
        workerGet('/quote',{symbol:sym}),
        workerGet('/profile',{symbol:sym}).catch(()=>({}))
      ]);
      if(!q||!q.c) return null;
      return {ticker:sym,name:p.name||sym,price:q.c||0,change:q.d||0,pct:q.dp||0,
        high:q.h||0,low:q.l||0,high52:null,low52:null,volume:0,
        mktCap:p.marketCapitalization?p.marketCapitalization*1e6:null,
        pe:p.pe||null,beta:null,exchange:p.exchange||'',currency:p.currency||'USD',
        marketOpen:true,logo:p.logo||'',industry:p.finnhubIndustry||'',country:p.country||''};
    }catch{return null;}
  }));
  const valid=results.filter(Boolean);
  if(!valid.length) throw new Error('تعذّر جلب بيانات الأسهم');
  return valid;
}

// Fetch real 52-week range from metrics endpoint
async function fetch52WeekRange(ticker) {
  try {
    const m = await workerGet('/metrics', {symbol: ticker});
    const metric = m.metric || {};
    return {
      high52: metric['52WeekHigh'] || null,
      low52:  metric['52WeekLow']  || null,
    };
  } catch { return { high52: null, low52: null }; }
}

async function yfStats(symbol) {
  try {
    const [metrics,profile]=await Promise.all([
      workerGet('/metrics',{symbol}),
      workerGet('/profile',{symbol}).catch(()=>({}))
    ]);
    const m=metrics.metric||{};
    return {
      summaryDetail:{trailingPE:{raw:m['peInclExtraTTM']||m['peTTM']||null},dividendYield:{raw:m['dividendYieldIndicatedAnnual']||null},beta:{raw:m['beta']||null}},
      defaultKeyStatistics:{trailingEps:{raw:m['epsTTM']||null},priceToBook:{raw:m['pbAnnual']||null}},
      financialData:{debtToEquity:{raw:m['totalDebt/totalEquityAnnual']||null},returnOnEquity:{raw:m['roeRfy']?m['roeRfy']/100:null},grossMargins:{raw:m['grossMarginTTM']?m['grossMarginTTM']/100:null},currentRatio:{raw:m['currentRatioAnnual']||null},revenueGrowth:{raw:m['revenueGrowthTTMYoy']?m['revenueGrowthTTMYoy']/100:null}},
    };
  } catch { return {}; }
}

async function yfNews(symbol) {
  try {
    const sym=Array.isArray(symbol)?symbol[0]:symbol.split(',')[0].trim();
    const today=new Date().toISOString().slice(0,10);
    const from=new Date(Date.now()-7*86400000).toISOString().slice(0,10);
    const arr=await workerGet('/news',{symbol:sym,from,to:today});
    if(arr?.length) return arr.slice(0,8).map(n=>({title:n.headline||'',link:n.url||'#',publisher:n.source||'',summary:n.summary||'',providerPublishTime:n.datetime||null}));
  } catch {}
  return [];
}

async function getMarketNews() {
  try {
    const d=await workerGet('/market-news');
    return (d||[]).slice(0,4).map(n=>({title:n.headline||'',link:n.url||'#',publisher:n.source||'',providerPublishTime:n.datetime||null}));
  } catch { return []; }
}

// ══════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════
function ls(k, def) {
  try {
    const v = localStorage.getItem(k);
    if (!v) return def;
    const parsed = JSON.parse(v);
    // Reject API keys that look like URLs (corruption guard)
    if (typeof parsed === 'string' && parsed.startsWith('http')) return def;
    return parsed;
  }
  catch { return def; }
}
function lss(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
}

// tdFetch → redirects all calls through Worker
async function tdFetch(endpoint, params={}) {
  if (endpoint === '/quote') {
    const syms = (params.symbol||'').split(',').map(s=>s.trim()).filter(Boolean);
    if (!syms.length) return [];
    const results = await yfQuote(syms);
    return syms.length === 1 ? results[0]||{} : results;
  }
  if (endpoint === '/statistics') return await yfStats(params.symbol||'');
  if (endpoint === '/news') return await yfNews(params.symbol||'');
  throw new Error('endpoint not supported');
}


async function clFetch(prompt,system='') {
  const r=await fetch(WORKER_URL+'/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,system:system||'أنت محلل أسهم محترف.'})});
  if(!r.ok) throw new Error('خطأ في الاتصال بخادم AI ('+r.status+')');
  const d=await r.json();
  if(d.error) throw new Error(d.error.message || 'خطأ من Claude API');
  const text = d.content?.[0]?.text;
  if(!text) throw new Error('لم يصل رد من AI');
  return text;
}

function normQuote(q) { if(q && q.ticker && q.price!==undefined) return q; if(q && q.symbol && !q.ticker) { q.ticker=q.symbol; return q; } // normalize
  if (!q) return { ticker:'', name:'', price:0, change:0, pct:0, high:0, low:0, high52:0, low52:0, volume:0, mktCap:null, pe:null, beta:null, marketState:'CLOSED', preMarket:null, postMarket:null };
  // Yahoo Finance format
  const price  = parseFloat(q.price || q.regularMarketPrice || q.close || 0);
  // Direct pct field
  if (q.changesPercentage !== undefined) { const p2 = q.changesPercentage; const c2 = q.change || 0; return { ticker: q.symbol||q.ticker||'', name: q.name||q.symbol||'', price, change: parseFloat(c2), pct: parseFloat(p2), high: parseFloat(q.high||q.dayHigh||price), low: parseFloat(q.low||q.dayLow||price), high52: parseFloat(q.high52||q.yearHigh||price), low52: parseFloat(q.low52||q.yearLow||price), volume: q.volume||0, mktCap: q.marketCap||null, pe: q.pe||null, beta: q.beta||null, marketState: q.marketState||'CLOSED', preMarket: q.preMarket||null, postMarket: q.postMarket||null }; }
  const prev   = parseFloat(q.previousClose || q.previous_close || q.chartPreviousClose || price);
  const change = price - prev;
  const pct    = prev ? (change / prev) * 100 : 0;
  return {
    ticker:      q.symbol || q.ticker || '',
    name:        q.name || q.longName || q.shortName || q.symbol || '',
    price,
    change,
    pct,
    high:        parseFloat(q.high || q.regularMarketDayHigh || price),
    low:         parseFloat(q.low  || q.regularMarketDayLow  || price),
    high52:      parseFloat(q.high52 || q.fiftyTwoWeekHigh   || q.fifty_two_week?.high || price),
    low52:       parseFloat(q.low52  || q.fiftyTwoWeekLow    || q.fifty_two_week?.low  || price),
    volume:      q.volume || q.regularMarketVolume || 0,
    mktCap:      q.marketCap || q.market_cap || null,
    pe:          q.pe || null,
    beta:        q.beta || null,
    marketState: q.marketState || 'CLOSED',
    preMarket:   q.preMarket || null,
    postMarket:  q.postMarket || null,
  };
}

function nav(page, data = null) {
  S.page = page;
  if (data) S.stock = data;

  // Update bottom nav
  ['home','discover','watchlist','portfolio','calendar'].forEach(p => {
    const el = document.getElementById('bn-' + p);
    if (el) el.className = 'bnav-item' + (p === page ? ' active' : '');
  });

  // Render
  const pg = document.getElementById('page');
  pg.innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  switch (page) {
    case 'home':      renderHome();       break;
    case 'discover':  renderDiscover();   break;
    case 'watchlist': renderWatchlist();  break;
    case 'portfolio': renderPortfolio();  break;
    case 'calendar':  renderCalendar();   break;
    case 'stock':     renderStock();      break;
    case 'settings':  renderSettings();   break;
    default:          renderHome();
  }
}

function scoreClass(n) {
  return n >= 75 ? 'high' : n >= 50 ? 'mid' : 'low';
}
function scoreLabel(n) {
  return n >= 75 ? 'قوي' : n >= 50 ? 'متوسط' : 'ضعيف';
}
function fmtPct(n, sign = true) {
  const s = n >= 0 ? (sign ? '+' : '') : '';
  return s + n.toFixed(2) + '%';
}
function fmtPrice(n) {
  return '$' + parseFloat(n).toFixed(2);
}
function fmtLarge(n) {
  if (!n) return '—';
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
  return '$' + n.toLocaleString();
}

function rangeBarHTML(low, high, cur, cls) {
  if (!low || !high || low >= high) return '<div class="range-bar-wrap"><div class="range-bar-fill ' + cls + '" style="width:50%"></div></div>';
  const pct = Math.max(2, Math.min(98, ((cur - low) / (high - low)) * 100));
  return `
    <div class="range-bar-wrap" dir="ltr">
      <div class="range-bar-fill ${cls}" style="width:${pct}%"></div>
      <div class="range-dot ${cls}" style="left:${pct}%;transform:translate(-50%,-50%)"></div>
    </div>`;
}

function scoreBarHTML(name, score) {
  const cls = scoreClass(score);
  return `
    <div class="score-bar-item">
      <div class="score-bar-header">
        <span class="score-bar-name">${name}</span>
        <span class="score-bar-val ${cls}">${score} — ${scoreLabel(score)}</span>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill ${cls}" style="width:${score}%"></div>
      </div>
    </div>`;
}

// STRATEGY ENGINE — partial real filtering (pre-Twelve Data)
// Uses available Finnhub data: price, %change, volume proxy, P/E, market cap
// ══════════════════════════════════════════

function applyStrategy(style, quotes) {
  // quotes: array of normalized yfQuote results { ticker, price, pct, high, low, mktCap, pe, volume, ... }
  let filtered = [];

  if (style === 'scalp') {
    // Scalp: needs volatility + liquidity
    filtered = quotes.filter(q => {
      const dayRangePct = q.high && q.low ? ((q.high - q.low) / q.low) * 100 : 0;
      const hasVolatility = dayRangePct > 1.5 || Math.abs(q.pct) > 1.5;
      const inPriceRange = q.price >= 3 && q.price <= 500;
      return hasVolatility && inPriceRange;
    });
    filtered.sort((a,b) => Math.abs(b.pct) - Math.abs(a.pct)); // most volatile first
  }
  else if (style === 'swing') {
    // Swing: moderate positive momentum, not overextended
    filtered = quotes.filter(q => {
      const reasonableMove = q.pct > -3 && q.pct < 8; // not crashing, not already overextended
      const hasMcap = !q.mktCap || q.mktCap > 1e9; // mid-large cap preferred
      return reasonableMove && hasMcap;
    });
    filtered.sort((a,b) => b.pct - a.pct); // best momentum first
  }
  else if (style === 'invest') {
    // Invest: prefer reasonable P/E, large cap, stability
    filtered = quotes.filter(q => {
      const reasonablePE = !q.pe || (q.pe > 0 && q.pe < 45);
      const largeCap = !q.mktCap || q.mktCap > 5e9;
      const notCrashing = q.pct > -5;
      return reasonablePE && largeCap && notCrashing;
    });
    filtered.sort((a,b) => (b.mktCap||0) - (a.mktCap||0)); // largest, most stable first
  }
  else {
    filtered = quotes;
  }

  return filtered.length ? filtered : quotes; // fallback to unfiltered if nothing passes
}

function computeHonestScore(q, style) {
  // Transparent scoring based on real signals available (no random)
  let score = 50; // baseline neutral

  // Momentum component (±20)
  if (style === 'scalp') {
    const dayRangePct = q.high && q.low ? ((q.high - q.low) / q.low) * 100 : 0;
    score += Math.min(20, dayRangePct * 4);
  } else {
    score += Math.max(-20, Math.min(20, q.pct * 3));
  }

  // Valuation component for invest (±15)
  if (style === 'invest' && q.pe) {
    if (q.pe > 0 && q.pe < 25) score += 15;
    else if (q.pe < 35) score += 5;
    else score -= 5;
  }

  // Market cap stability component (±10)
  if (q.mktCap) {
    if (q.mktCap > 50e9) score += 10;
    else if (q.mktCap > 5e9) score += 5;
  }

  return Math.max(10, Math.min(95, Math.round(score)));
}

function buildSetupNote(q, style) {
  if (style === 'scalp') {
    const dayRangePct = q.high && q.low ? ((q.high - q.low) / q.low) * 100 : 0;
    if (dayRangePct > 4) return 'تقلب يومي مرتفع';
    if (q.pct > 1.5) return 'زخم صاعد قوي';
    if (q.pct < -1.5) return 'ضغط بيعي';
    return 'تذبذب ضمن نطاق';
  }
  if (style === 'swing') {
    if (q.pct > 2) return 'زخم صاعد متوسط المدى';
    if (q.pct > 0) return 'استقرار إيجابي';
    if (q.pct < -2) return 'تصحيح محتمل';
    return 'مراقبة الاتجاه';
  }
  // invest
  if (q.pe && q.pe < 20) return 'تقييم معقول نسبياً';
  if (q.mktCap && q.mktCap > 100e9) return 'شركة كبيرة مستقرة';
  return 'مراقبة الأساسيات';
}

function handleSearchKeydown(e) {
  if (e.key === 'Enter') {
    const v = e.target.value.trim().toUpperCase();
    const drop = document.getElementById('searchDropdown');
    if (drop) drop.style.display = 'none';
    if (v) openStock(v);
  } else if (e.key === 'Escape') {
    const drop = document.getElementById('searchDropdown');
    if (drop) drop.style.display = 'none';
  }
}

let _searchTimer = null;
async function searchAutocomplete(q) {
  const drop = document.getElementById('searchDropdown');
  if (!drop) return;
  if (!q || q.length < 1) { drop.style.display='none'; return; }
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(async () => {
    try {
      const d = await workerGet('/search', {q});
      const results = (d.result||[]).filter(r=>r.type==='Common Stock').slice(0,6);
      if (!results.length) { drop.style.display='none'; return; }
      drop.style.display = 'block';
      drop.innerHTML = results.map(r => `
        <div onclick="document.getElementById('searchInput').value='${r.symbol}';document.getElementById('searchDropdown').style.display='none';openStock('${r.symbol}')"
          style="padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border2)"
          onmouseover="this.style.background='var(--primary-bg)'" onmouseout="this.style.background=''">
          <span style="font-weight:800;font-family:var(--font-en);color:var(--primary);min-width:50px">${r.symbol}</span>
          <span style="font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.description||''}</span>
        </div>`).join('');
    } catch { drop.style.display='none'; }
  }, 300);
}

// Market Status
async function loadMarketStatus() {
  // 30-min cache
  const cached = ls('tt_mkt_cache',null);
  if (cached && Date.now()-ls('tt_mkt_ts',0) < 30*60*1000) { applyMarketStatus(cached); return; }
  try {
    const arr = await yfQuote(['SPY']);
    const spy = arr[0];
    if (!spy) throw new Error('no data');
    const data = { pct: spy.pct, price: spy.price, tickerData:[{label:'S&P 500',pct:spy.pct,price:spy.price}] };
    lss('tt_mkt_cache', data); lss('tt_mkt_ts', Date.now());
    applyMarketStatus(data);
  } catch(e) {
    const lbl=document.getElementById('mktLabel');
    if (lbl) { lbl.textContent = 'تعذّر جلب بيانات السوق'; lbl.style.color='var(--text3)'; }
  }
}

async function loadIdeas(force = false) {
  const box = document.getElementById('ideasList');
  if (!box) return;

  const cached = ls('tt_ideas_' + S.style, null);
  const cacheAge = ls('tt_ideas_ts_' + S.style, 0);
  if (!force && cached && Date.now() - cacheAge < 30 * 60 * 1000) {
    renderIdeas(cached);
    updateIdeasTimestamp(cacheAge);
    return;
  }

  box.innerHTML = `<div class="loading-text"><div class="spinner"></div> جاري تحليل الفرص...</div>`;

  const pool = S.market === 'sa' ? SA_STOCKS :
    S.style === 'scalp' ? SCALP_POOL :
    S.style === 'invest' ? INVEST_POOL : SWING_POOL;

  try {
    const quotes = await yfQuote(pool);
    const filtered = applyStrategy(S.style, quotes);
    const ideas = filtered.slice(0, 3).map(q => ({
      ticker: q.ticker,
      price: q.price,
      pct: q.pct,
      setup: buildSetupNote(q, S.style),
      score: computeHonestScore(q, S.style)
    }));
    lss('tt_ideas_' + S.style, ideas);
    lss('tt_ideas_ts_' + S.style, Date.now());
    renderIdeas(ideas);
    updateIdeasTimestamp(Date.now());
  } catch(e) {
    box.innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>تعذّر تحميل البيانات</p><button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="loadIdeas(true)"><i class="ti ti-refresh"></i> إعادة المحاولة</button></div>`;
  }
}


function updateIdeasTimestamp(ts) {
  const el = document.getElementById('ideasUpdated');
  if (!el) return;
  const mins = Math.round((Date.now() - ts) / 60000);
  el.textContent = mins < 1 ? 'الآن' : mins === 1 ? 'قبل دقيقة' : `قبل ${mins} د`;
}

function renderIdeas(ideas) {
  const box = document.getElementById('ideasList');
  if (!box) return;
  box.innerHTML = ideas.map(idea => {
    const cls = scoreClass(idea.score);
    const bias = idea.pct >= 0.5 ? 'Bullish' : idea.pct <= -0.5 ? 'Bearish' : 'Neutral';
    const biasColor = idea.pct >= 0.5 ? 'var(--green)' : idea.pct <= -0.5 ? 'var(--red)' : 'var(--amber)';
    const target = (idea.price * (1 + (idea.pct>=0?0.08:0.05))).toFixed(0);
    const risk = idea.score >= 75 ? 'Low' : idea.score >= 50 ? 'Medium' : 'High';
    return `
      <div class="idea-card" onclick="openStock('${idea.ticker}')">
        <div class="idea-ticker">${idea.ticker}</div>
        <div class="idea-info">
          <div class="idea-name">${idea.ticker} <span style="font-weight:600;color:var(--text3);font-size:11px">Score ${idea.score}</span></div>
          <div class="idea-setup" style="display:flex;align-items:center;gap:8px;margin-top:3px">
            <span style="color:${biasColor};font-weight:700;font-size:11px">${bias}</span>
            <span style="color:var(--text3)">·</span>
            <span style="font-size:11px">Target: $${target}</span>
            <span style="color:var(--text3)">·</span>
            <span style="font-size:11px;color:var(--text3)">Risk: ${risk}</span>
          </div>
        </div>
        <div class="idea-right">
          <div style="font-size:15px;font-weight:800;font-family:var(--font-en)">${fmtPrice(idea.price)}</div>
          <div class="pct-badge ${idea.pct>=0?'up':'dn'}">${fmtPct(idea.pct)}</div>
        </div>
      </div>`;
  }).join('');
}

    const qd = quotes[0] || {};

    // Compute scores (weighted heuristics)
    const techScore = Math.round(

      Math.random() * 20

    const finScore = Math.round(55 + Math.random() * 35);

async function translateNews(idx, title, summary) {
  const btn = event.target.closest('button');
  if (!btn) return;
  const titleEl = document.getElementById('newsTitle_' + idx);
  if (!titleEl) return;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:12px;height:12px;margin:0 auto"></div>';
  try {
    const res = await clFetch(
      'ترجم هذا العنوان الإخباري للعربية بدقة واختصار:\n' + title +
      (summary ? ('\n\nوهذا ملخص مختصر:\n' + summary) : '') +
      '\n\nأعطني فقط:\n1. العنوان بالعربية\n2. جملة ملخص واحدة بالعربية'
    );
    titleEl.innerHTML = res.split('\n').join('<br>');

    btn.innerHTML = '<i class="ti ti-check" style="font-size:11px"></i> تمت';
    btn.disabled = true;
  } catch(e) {
    btn.innerHTML = '<i class="ti ti-language" style="font-size:11px"></i> ترجمة';
    btn.disabled = false;
  }
}

function toggleWLfromStock(ticker) {
  const idx = S.watchlist.indexOf(ticker);
  if (idx > -1) {
    S.watchlist.splice(idx, 1);
  } else {
    S.watchlist.unshift(ticker);
  }
  lss('tt_wl2', S.watchlist);
  const btn = document.getElementById('wlToggleBtn');
  if (btn) {
    const inWl = S.watchlist.includes(ticker);
    btn.innerHTML = `<i class="ti ${inWl?'ti-star-filled':'ti-star'}"></i>`;
    btn.style.color = inWl ? '#F5B82E' : 'var(--text3)';
    showToast(inWl ? `${ticker} أُضيف للمتابعة ⭐` : `${ticker} حُذف من المتابعة`);
  }

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90vw;text-align:center';
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

function addToWatchlistPrompt() {
  const ticker = prompt('أدخل رمز السهم:');

    S.watchlist.unshift(t);
    lss('tt_wl2', S.watchlist);
  }
  loadWatchlistFull();
}

function removeFromWL(ticker) {
  S.watchlist = S.watchlist.filter(t => t !== ticker);
  lss('tt_wl2', S.watchlist);
  loadWatchlistFull();
}

function addToWLfromStock(ticker) {
  if (!S.watchlist.includes(ticker)) {
    S.watchlist.unshift(ticker);
    lss('tt_wl2', S.watchlist);
  }
}

async function loadDiscoverStocks() {
  const box = document.getElementById('discoverList');
  if (!box) return;
  const pool = S.market === 'sa' ? SA_STOCKS :
    S.style === 'scalp' ? SCALP_POOL :
    S.style === 'invest' ? INVEST_POOL : SWING_POOL;
  try {
    const quotes = await yfQuote(pool);
    const filtered = applyStrategy(S.style, quotes);
    const ideas = filtered.slice(0, 5).map(q => ({
      ticker: q.ticker,
      price: q.price,
      pct: q.pct,
      setup: buildSetupNote(q, S.style),
      score: computeHonestScore(q, S.style)
    }));
    box.innerHTML = ideas.map(idea => {
      const cls = scoreClass(idea.score);
      const bias = idea.pct >= 0.5 ? 'Bullish' : idea.pct <= -0.5 ? 'Bearish' : 'Neutral';
      const biasColor = idea.pct >= 0.5 ? 'var(--green)' : idea.pct <= -0.5 ? 'var(--red)' : 'var(--amber)';
      const target = (idea.price * (1 + (idea.pct>=0?0.08:0.05))).toFixed(0);
      const risk = idea.score >= 75 ? 'Low' : idea.score >= 50 ? 'Medium' : 'High';
      return `
        <div class="idea-card card" style="margin-bottom:8px;padding:12px 14px" onclick="openStock('${idea.ticker}')">
          <div class="idea-ticker">${idea.ticker}</div>
          <div class="idea-info">
            <div class="idea-name">${idea.ticker} <span style="font-weight:600;color:var(--text3);font-size:11px">Score ${idea.score}</span></div>
            <div class="idea-setup" style="display:flex;align-items:center;gap:8px;margin-top:3px;color:var(--text2)">
              <span style="color:${biasColor};font-weight:700;font-size:11px">${bias}</span>
              <span style="color:var(--text3)">·</span>
              <span style="font-size:11px">Target: $${target}</span>
              <span style="color:var(--text3)">·</span>
              <span style="font-size:11px;color:var(--text3)">Risk: ${risk}</span>
            </div>
          </div>
          <div class="idea-right">
            <div style="font-size:15px;font-weight:800;font-family:var(--font-en)">${fmtPrice(idea.price)}</div>
            <div class="pct-badge ${idea.pct>=0?'up':'dn'}">${fmtPct(idea.pct)}</div>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    box.innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>تعذّر تحميل البيانات</p><button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="loadDiscoverStocks()"><i class="ti ti-refresh"></i> إعادة المحاولة</button></div>`;
  }
}

      <button class="tag tag-gray active-filter" onclick="filterCal('all',this)" style="cursor:pointer">الكل</button>
      <button class="tag tag-red" onclick="filterCal('H',this)" style="cursor:pointer">تأثير عالٍ</button>
      <button class="tag tag-amber" onclick="filterCal('macro',this)" style="cursor:pointer">ماكرو</button>
      <button class="tag tag-green" onclick="filterCal('earnings',this)" style="cursor:pointer">أرباح</button>
    </div>

    <div id="calList">
      ${upcoming.map(e => calEventCard(e)).join('')}
    </div>
    <div class="disclaimer">ماكرو = أحداث اقتصادية كبيرة تؤثر على السوق بالكامل مثل قرارات الفائدة والتضخم والوظائف</div>
  `;
}

function calEventCard(e) {
  const impactColors = { H: 'red', M: 'amber', L: 'green' };
  const impactLabels = { H: 'عالٍ', M: 'متوسط', L: 'منخفض' };
  const typeLabel = e.type === 'earnings' ? 'أرباح شركة' : 'حدث اقتصادي';
  const typeIcon  = e.type === 'earnings' ? 'ti-building' : 'ti-world';
  const dateF = new Date(e.date+'T00:00:00').toLocaleDateString('ar-SA',{weekday:'short',month:'short',day:'numeric'});

  return `
    <div class="card" style="margin-bottom:8px" data-type="${e.type}" data-impact="${e.impact}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-size:14px;font-weight:700;margin-bottom:3px">${e.name}</div>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="tag tag-${e.type==='earnings'?'gray':'amber'}" style="font-size:10px">
              <i class="ti ${typeIcon}"></i> ${typeLabel}
            </span>
            <span class="tag tag-${impactColors[e.impact]}" style="font-size:10px">${impactLabels[e.impact]}</span>
          </div>
        </div>
        <div style="text-align:left;flex-shrink:0">
          <div style="font-size:12px;font-weight:700;color:var(--primary)">${dateF}</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7;padding:10px 12px;background:var(--bg);border-radius:var(--radius-xs)">${e.desc}</div>
      ${e.type==='earnings' ? `
        <button class="btn btn-outline btn-sm" style="margin-top:10px;width:100%" onclick="loadEarningsPreview('${e.name}','${e.date}',this)">
          <i class="ti ti-chart-bar"></i> تحليل الأرباح
        </button>` : ''}
    </div>`;
}

function filterCal(f, btn) {
  document.querySelectorAll('#calFilter button').forEach(b => b.style.fontWeight = '500');
  btn.style.fontWeight = '800';
  document.querySelectorAll('#calList .card[data-type]').forEach(card => {
    const show = f === 'all' || card.dataset.type === f || card.dataset.impact === f;
    card.style.display = show ? '' : 'none';
  });
}

async function loadEarningsPreview(name, date, btn) {

  const card = btn.closest('.card');
  const resultDiv = card.querySelector('.earnings-result');
  if (resultDiv) { resultDiv.remove(); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;margin:0 auto"></div>';
  try {
    const res = await clFetch(
      `أعطني تحليلاً موجزاً واحترافياً لحدث الأرباح التالي:\n\nالحدث: ${name}\nالتاريخ: ${date}\n\nاكتب التحليل كخبر مالي احترافي في 3 فقرات قصيرة:\n1. ما الذي يترقبه السوق\n2. أهم المقاييس المالية للمراقبة\n3. توقعات تأثير الحدث على السهم\n\nبدون رموز خاصة أو نقاط متعددة — فقط نص احترافي منظم.`
    );
    const div = document.createElement('div');
    div.className = 'earnings-result';
    div.style.cssText = 'margin-top:10px;padding:12px;background:var(--primary-bg);border-radius:var(--radius-xs);font-size:12px;line-height:1.8;color:var(--text2);border-right:3px solid var(--primary)';
    div.innerHTML = `<div style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:6px">تحليل الحدث</div>${res}`;
    card.appendChild(div);
    btn.innerHTML = '<i class="ti ti-x"></i> إغلاق التحليل';
    btn.disabled = false;
    btn.onclick = function() { div.remove(); btn.innerHTML = '<i class="ti ti-chart-bar"></i> تحليل الأرباح'; btn.onclick = () => loadEarningsPreview(name,date,btn); };
  } catch(e) {
    btn.innerHTML = '<i class="ti ti-chart-bar"></i> تحليل الأرباح';
    btn.disabled = false;
    alert(e.message);
  }
}

// ══════════════════════════════════════════
// PORTFOLIO PAGE (Basic — Phase 2 full)
// ══════════════════════════════════════════
function renderPortfolio() {
  const pg = document.getElementById('page');
  const trades = ls('tt_trades2', []);
  const closed = trades.filter(t => t.exitPrice > 0);
  const pnl = closed.reduce((s,t) => s + ((t.direction==='long')?(t.exitPrice-t.entryPrice)*t.qty:(t.entryPrice-t.exitPrice)*t.qty - (t.fees||0)), 0);
  const wins = closed.filter(t => {
    const p = (t.direction==='long')?(t.exitPrice-t.entryPrice)*t.qty:(t.entryPrice-t.exitPrice)*t.qty;
    return p > 0;
  });
  const winRate = closed.length ? Math.round(wins.length/closed.length*100) : 0;

  pg.innerHTML = `
    <div class="section-header">
      <h2 style="font-size:18px;font-weight:800">المحفظة</h2>
      <button class="btn btn-primary btn-sm" onclick="showAddTradeForm2()"><i class="ti ti-plus"></i> صفقة</button>
    </div>

    <!-- Summary Cards -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="card" style="text-align:center">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">إجمالي الربح/الخسارة</div>
        <div style="font-size:22px;font-weight:800;color:${pnl>=0?'var(--green)':'var(--red)'}">${pnl>=0?'+':''}${pnl.toFixed(0)}$</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">نسبة النجاح</div>
        <div style="font-size:22px;font-weight:800;color:${winRate>=60?'var(--green)':winRate>=40?'var(--amber)':'var(--red)'}">${winRate}%</div>
      </div>
    </div>

    <div id="addTradeForm2" style="display:none;margin-bottom:12px"></div>

    <!-- Trades -->
    <div class="section-header"><div class="section-title">الصفقات (${trades.length})</div></div>
    ${trades.length === 0 ? `
      <div class="empty-state"><i class="ti ti-briefcase"></i><p>لا توجد صفقات مسجّلة بعد</p></div>` :
      trades.map((t,i) => {
        const p = t.exitPrice > 0 ? ((t.direction==='long')?(t.exitPrice-t.entryPrice)*t.qty:(t.entryPrice-t.exitPrice)*t.qty - (t.fees||0)) : null;
        const open = !t.exitPrice || t.exitPrice === 0;
        return `
          <div class="card" style="margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:10px">
              <div class="idea-ticker">${t.ticker}</div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:700">${t.ticker} <span style="font-size:10px;color:var(--text3);font-weight:400">${t.date}</span></div>
                <div style="font-size:11px;color:var(--text3)">دخول $${t.entryPrice} × ${t.qty} سهم</div>
              </div>
              <div style="text-align:left">
                ${open ? `<span class="tag tag-amber">مفتوحة</span>` :
                  `<div style="font-size:15px;font-weight:800;color:${p>=0?'var(--green)':'var(--red)'}">${p>=0?'+':''}${p.toFixed(0)}$</div>`}
              </div>
            </div>
            <div style="display:flex;gap:6px;margin-top:8px">
              ${open ? `<button class="btn btn-primary btn-sm" style="flex:1" data-idx="${i}" onclick="closeTradePrompt(this.dataset.idx)">إغلاق الصفقة</button>` : ''}
              <button class="btn btn-outline btn-sm" style="${open?'':'flex:1'}" data-idx="${i}" onclick="deleteTrade2(this.dataset.idx)"><i class="ti ti-trash"></i></button>
            </div>
          </div>`;
      }).join('')
    }
    <div class="disclaimer">المعلومات لأغراض تعليمية فقط.</div>
  `;
}

function showAddTradeForm2() {
  const f = document.getElementById('addTradeForm2');
  if (!f) return;
  f.style.display = f.style.display === 'block' ? 'none' : 'block';
  f.innerHTML = `
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">تسجيل صفقة جديدة</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">الرمز</div>
          <input type="text" id="nt2_sym" placeholder="NVDA" style="width:100%;padding:9px 11px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-weight:700;text-transform:uppercase">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">التاريخ</div>
          <input type="date" id="nt2_date" value="${new Date().toISOString().slice(0,10)}" style="width:100%;padding:9px 11px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">سعر الدخول</div>
          <input type="number" id="nt2_entry" placeholder="150.00" step="0.01" style="width:100%;padding:9px 11px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">الكمية</div>
          <input type="number" id="nt2_qty" placeholder="100" min="1" style="width:100%;padding:9px 11px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1" onclick="saveNewTrade2()"><i class="ti ti-check"></i> حفظ</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('addTradeForm2').style.display='none'">إلغاء</button>
      </div>
    </div>`;
}

function saveNewTrade2() {
  const sym   = (document.getElementById('nt2_sym')?.value||'').trim().toUpperCase();
  const entry = parseFloat(document.getElementById('nt2_entry')?.value||0);
  const qty   = parseInt(document.getElementById('nt2_qty')?.value||0);
  if (!sym || !entry || !qty) { alert('أدخل الرمز والسعر والكمية'); return; }
  const trades = ls('tt_trades2', []);
  trades.unshift({ ticker:sym, date:document.getElementById('nt2_date')?.value||'', direction:'long', entryPrice:entry, exitPrice:0, qty, fees:0 });
  lss('tt_trades2', trades);
  renderPortfolio();
}

function closeTradePrompt(idx) {
  const exit = prompt('سعر الخروج:');
  if (!exit) return;
  const trades = ls('tt_trades2', []);
  trades[parseInt(idx)].exitPrice = parseFloat(exit);
  lss('tt_trades2', trades);
  renderPortfolio();
}

function deleteTrade2(idx) {
  if (!confirm('حذف الصفقة؟')) return;
  const trades = ls('tt_trades2', []);
  trades.splice(parseInt(idx), 1);
  lss('tt_trades2', trades);
  renderPortfolio();
}

// SETTINGS PAGE
// ══════════════════════════════════════════
function renderSettings() {
  const pg = document.getElementById('page');
  pg.innerHTML = `
    <h2 style="font-size:18px;font-weight:800;margin-bottom:16px">الإعدادات</h2>

    <div class="card" style="margin-bottom:10px">
      <div class="card-title"><i class="ti ti-shield-check"></i> الأمان</div>
      <div style="background:var(--primary-bg);border:1px solid rgba(22,163,74,.2);border-radius:var(--radius-sm);padding:14px;display:flex;align-items:center;gap:12px">
        <i class="ti ti-shield-check" style="color:var(--green);font-size:28px;flex-shrink:0"></i>
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--green)">البيانات محمية ✓</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px;line-height:1.6">جميع مفاتيح API محفوظة في خادم آمن. لا تحتاج إدخال أي مفتاح — افتح التطبيق واستخدمه مباشرة.</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:10px">
      <div class="card-title"><i class="ti ti-palette"></i> المظهر واللغة</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">الوضع</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn ${S.theme==='light'?'btn-primary':'btn-outline'}" style="flex:1" onclick="setTheme('light')"><i class="ti ti-sun"></i> فاتح</button>

      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">لو المفاتيح لا تعمل، اضغط هنا لمسح الإعدادات القديمة</div>

    <div class="card">
      <div class="card-title"><i class="ti ti-info-circle"></i> عن TradeTree</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.8">
        <div style="margin-bottom:6px">النسخة: 2.0 MVP</div>
        <div style="margin-bottom:6px">مبني بـ Claude AI + Twelve Data</div>
        <div style="color:var(--text3)">جميع المعلومات لأغراض تعليمية فقط. لا توجد توصيات استثمارية.</div>
      </div>
    </div>
  `;
}


function clearAllKeys() {
  ['tt_tdkey','tt_finnhub','tt_clkey','tt_mkt_cache','tt_mkt_ts'].forEach(k => localStorage.removeItem(k));
  S.tdKey = ''; S.finnhubKey = ''; S.clKey = '';
  showToast('تم مسح جميع المفاتيح ✓ أدخلها من جديد');
  renderSettings();
}

function saveSettings() { showToast('الإعدادات محفوظة ✓'); }

function setLang(l) {
  S.lang = l;
  lss('tt_lang', l);
  document.documentElement.setAttribute('lang', l);
  document.documentElement.setAttribute('dir', l==='ar'?'rtl':'ltr');
  renderSettings();
}

function setTheme(t) {
  S.theme = t;
  lss('tt_theme', t);
  applyTheme();
  renderSettings();
}

  applyTheme();

  // Sync market pill
  const btns = document.querySelectorAll('#marketPill button');

  btns[1].className = S.market === 'sa' ? 'active' : '';

});

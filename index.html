<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>TradeTree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════ */
:root {
  --green:      #16A34A;
  --green-light:#DCFCE7;
  --red:        #DC2626;
  --red-light:  #FEE2E2;
  --amber:      #D97706;
  --amber-light:#FEF3C7;
  --blue:       #2563EB;

  --bg:         #F8F7F3;
  --card:       #FFFFFF;
  --border:     #E8E5DF;
  --border2:    #F0EDE8;

  --text:       #1A1A1A;
  --text2:      #4B5563;
  --text3:      #9CA3AF;

  --primary:    #16A34A;
  --primary-bg: #F0FDF4;

  --radius:     14px;
  --radius-sm:  10px;
  --radius-xs:  7px;

  --shadow:     0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);

  --font:       'Cairo', sans-serif;
  --font-en:    'Inter', sans-serif;

  --nav-h:      60px;
  --bottom-h:   64px;
}

[data-theme="dark"] {
  --bg:     #111111;
  --card:   #1C1C1C;
  --border: #2A2A2A;
  --border2:#252525;
  --text:   #F5F5F5;
  --text2:  #A0A0A0;
  --text3:  #555555;
  --primary-bg: rgba(22,163,74,.1);
  --shadow: 0 1px 3px rgba(0,0,0,.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,.4);
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

button {
  cursor: pointer;
  font-family: var(--font);
  border: none;
  outline: none;
  transition: opacity .15s, transform .1s;
}
button:active { transform: scale(.97); }

input, select, textarea {
  font-family: var(--font);
  outline: none;
  border: none;
  background: none;
}

a { text-decoration: none; color: inherit; }

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  background: var(--bg);
}

/* Top Nav */
#topNav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--nav-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
}

.nav-logo {
  font-size: 18px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -.5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.nav-logo span { color: var(--text); }

.nav-spacer { flex: 1; }

.nav-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-xs);
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  color: var(--text2);
  border: 1px solid var(--border);
}
.nav-btn:hover { color: var(--primary); border-color: var(--primary); }

/* Market Toggle Pill */
.market-pill {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px;
  gap: 2px;
}
.market-pill button {
  padding: 4px 10px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 600;
  background: transparent;
  color: var(--text2);
  transition: all .2s;
}
.market-pill button.active {
  background: var(--primary);
  color: #fff;
}

/* Page Content */
#page {
  padding: 14px 14px 80px;
  min-height: calc(100vh - var(--nav-h));
}

/* Bottom Nav */
#bottomNav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: var(--bottom-h);
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}

.bnav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 12px;
  border-radius: var(--radius-xs);
  background: transparent;
  color: var(--text3);
  font-size: 10px;
  font-weight: 600;
  min-width: 48px;
  transition: color .2s;
}
.bnav-item i { font-size: 20px; }
.bnav-item.active { color: var(--primary); }
.bnav-item.active i {
  background: var(--primary-bg);
  border-radius: 8px;
  padding: 4px 6px;
}

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px;
  box-shadow: var(--shadow);
}
.card + .card { margin-top: 10px; }

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title i { color: var(--primary); font-size: 15px; }

/* ══════════════════════════════════════════
   MARKET STATUS BAR
══════════════════════════════════════════ */
.market-status {
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  background: var(--card);
}
.status-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(255,255,255,.3);
}
.status-dot.bull { background: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,.15); }
.status-dot.bear { background: var(--red);   box-shadow: 0 0 0 3px rgba(220,38,38,.15); }
.status-dot.neutral { background: var(--amber); box-shadow: 0 0 0 3px rgba(217,119,6,.15); }
.status-label { font-size: 13px; font-weight: 700; }
.status-label.bull { color: var(--green); }
.status-label.bear { color: var(--red); }
.status-label.neutral { color: var(--amber); }
.status-indices {
  margin-right: auto;
  display: flex;
  gap: 8px;
  font-size: 11px;
  font-family: var(--font-en);
  flex-wrap: wrap;
}
.idx-item { display: flex; align-items: center; gap: 3px; color: var(--text2); }
.idx-item .up { color: var(--green); font-weight: 600; }
.idx-item .dn { color: var(--red); font-weight: 600; }

/* ══════════════════════════════════════════
   SEARCH BAR
══════════════════════════════════════════ */
.search-wrap {
  position: relative;
  margin-bottom: 14px;
}
.search-wrap i.icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 18px;
  pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 14px 46px 14px 56px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 15px;
  color: var(--text);
  transition: border-color .2s, box-shadow .2s;
  font-family: var(--font);
}
#searchInput:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(22,163,74,.1);
}
#searchInput::placeholder { color: var(--text3); }
.search-btn {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-xs);
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 700;
}

/* ══════════════════════════════════════════
   STYLE TABS (قصير / متوسط / طويل)
══════════════════════════════════════════ */
.style-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.style-tab {
  padding: 11px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--card);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all .2s;
}
.style-tab.active {
  border-color: var(--primary);
  background: var(--primary-bg);
}
.style-tab .tab-icon { font-size: 20px; line-height: 1; }
.style-tab .tab-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.style-tab.active .tab-name { color: var(--primary); }
.style-tab .tab-sub { font-size: 10px; color: var(--text3); }

/* ══════════════════════════════════════════
   TODAY'S IDEAS
══════════════════════════════════════════ */
.idea-card {
  display: flex;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border2);
  gap: 10px;
  cursor: pointer;
  transition: opacity .15s;
}
.idea-card:last-child { border-bottom: none; padding-bottom: 0; }
.idea-card:first-child { padding-top: 0; }
.idea-card:hover { opacity: .8; }

.idea-ticker {
  width: 42px;
  height: 42px;
  border-radius: var(--radius-xs);
  background: var(--primary-bg);
  color: var(--primary);
  font-size: 11px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: var(--font-en);
  letter-spacing: -.3px;
}
.idea-info { flex: 1; min-width: 0; }
.idea-name { font-size: 13px; font-weight: 700; }
.idea-setup { font-size: 11px; color: var(--text3); margin-top: 1px; }
.idea-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.score-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-en);
}
.score-badge.high { color: var(--green); }
.score-badge.mid  { color: var(--amber); }
.score-badge.low  { color: var(--red); }
.pct-badge {
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-en);
}
.pct-badge.up { color: var(--green); }
.pct-badge.dn { color: var(--red); }

/* ══════════════════════════════════════════
   NEWS STRIP
══════════════════════════════════════════ */
.news-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 9px 0;
  border-bottom: 1px solid var(--border2);
  cursor: pointer;
}
.news-item:last-child { border-bottom: none; }
.news-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--primary);
  flex-shrink: 0;
  margin-top: 6px;
}
.news-text { font-size: 12px; color: var(--text2); line-height: 1.5; flex: 1; }
.news-time { font-size: 10px; color: var(--text3); white-space: nowrap; font-family: var(--font-en); }

/* ══════════════════════════════════════════
   WATCHLIST MINI
══════════════════════════════════════════ */
.wl-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border2);
  cursor: pointer;
  transition: opacity .15s;
}
.wl-item:last-child { border-bottom: none; }
.wl-item:hover { opacity: .8; }
.wl-ticker {
  font-size: 14px;
  font-weight: 800;
  font-family: var(--font-en);
  color: var(--text);
  min-width: 52px;
}
.wl-trend {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.wl-trend.up { background: var(--green); }
.wl-trend.dn { background: var(--red); }
.wl-price { font-size: 13px; font-weight: 600; font-family: var(--font-en); flex: 1; }
.wl-pct { font-size: 12px; font-weight: 700; font-family: var(--font-en); }
.wl-pct.up { color: var(--green); }
.wl-pct.dn { color: var(--red); }
.wl-score { font-size: 11px; font-weight: 600; color: var(--text3); font-family: var(--font-en); }

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  transition: opacity .15s, transform .1s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border);
}
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:hover { opacity: .85; }

/* ══════════════════════════════════════════
   LOADING
══════════════════════════════════════════ */
.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--border2) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.loading-text {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

/* ══════════════════════════════════════════
   STOCK ANALYSIS PAGE
══════════════════════════════════════════ */
.stock-header {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.stock-name-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.stock-ticker-big {
  font-size: 22px;
  font-weight: 800;
  font-family: var(--font-en);
  color: var(--text);
}
.stock-company { font-size: 12px; color: var(--text3); margin-top: 1px; }

.tt-score-circle {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.tt-score-num {
  font-size: 22px;
  font-weight: 800;
  font-family: var(--font-en);
  line-height: 1;
}
.tt-score-label { font-size: 9px; color: var(--text3); font-weight: 600; letter-spacing: .5px; }

.price-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.price-main {
  font-size: 28px;
  font-weight: 800;
  font-family: var(--font-en);
  letter-spacing: -.5px;
}
.price-change {
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-en);
  padding: 2px 8px;
  border-radius: 20px;
}
.price-change.up { background: var(--green-light); color: var(--green); }
.price-change.dn { background: var(--red-light);   color: var(--red); }
.pre-post-badge {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* Range Bar */
.range-section { margin-bottom: 12px; }
.range-label { font-size: 11px; color: var(--text3); font-weight: 600; margin-bottom: 5px; display: flex; justify-content: space-between; }
.range-bar-wrap { position: relative; height: 6px; border-radius: 3px; background: var(--border); }
.range-bar-fill { position: absolute; height: 100%; border-radius: 3px; }
.range-bar-fill.day { background: linear-gradient(90deg, var(--green-light), var(--green)); }
.range-bar-fill.week52 { background: linear-gradient(90deg, #dbeafe, var(--blue)); }
.range-dot {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.range-dot.day { background: var(--green); }
.range-dot.week52 { background: var(--blue); }

/* Stat Grid */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.stat-item {
  background: var(--bg);
  border-radius: var(--radius-xs);
  padding: 9px 10px;
  border: 1px solid var(--border2);
}
.stat-label { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 3px; }
.stat-value { font-size: 13px; font-weight: 700; font-family: var(--font-en); }

/* Trade Setup */
.trade-setup {
  background: var(--primary-bg);
  border: 1.5px solid rgba(22,163,74,.2);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}
.setup-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 11px; display: flex; align-items: center; gap: 5px; }
.setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.setup-item { background: var(--card); border-radius: var(--radius-xs); padding: 9px 11px; border: 1px solid var(--border); }
.setup-key { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 3px; }
.setup-val { font-size: 14px; font-weight: 800; font-family: var(--font-en); }
.setup-val.green { color: var(--green); }
.setup-val.red   { color: var(--red); }
.setup-val.amber { color: var(--amber); }
.setup-item.full { grid-column: 1/-1; display: flex; justify-content: space-between; align-items: center; }

/* Score Bars */
.score-bar-item { margin-bottom: 11px; }
.score-bar-item:last-child { margin-bottom: 0; }
.score-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.score-bar-name { font-size: 12px; font-weight: 600; color: var(--text2); }
.score-bar-val { font-size: 12px; font-weight: 800; font-family: var(--font-en); }
.score-bar-val.high { color: var(--green); }
.score-bar-val.mid  { color: var(--amber); }
.score-bar-val.low  { color: var(--red); }
.score-bar-track { height: 7px; border-radius: 4px; background: var(--border); overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 4px; transition: width .8s ease; }
.score-bar-fill.high { background: var(--green); }
.score-bar-fill.mid  { background: var(--amber); }
.score-bar-fill.low  { background: var(--red); }

/* Final Score */
.final-score {
  background: var(--text);
  color: var(--card);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}
.final-score-num { font-size: 36px; font-weight: 900; font-family: var(--font-en); line-height: 1; }
.final-score-info { flex: 1; }
.final-score-label { font-size: 11px; opacity: .6; font-weight: 600; margin-bottom: 4px; }
.final-score-status { font-size: 14px; font-weight: 700; }
.final-score-meta { font-size: 11px; opacity: .5; margin-top: 2px; }

/* AI Insight */
.ai-insight {
  background: var(--card);
  border: 1px solid var(--border);
  border-right: 3px solid var(--primary);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 10px;
}
.ai-insight-label { font-size: 10px; font-weight: 700; color: var(--primary); letter-spacing: .5px; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.ai-insight-text { font-size: 13px; color: var(--text2); line-height: 1.7; }

/* Analysis Tabs */
.analysis-tabs {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 12px;
  gap: 2px;
}
.analysis-tab {
  flex: 1;
  padding: 8px 4px;
  border-radius: var(--radius-xs);
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  background: transparent;
  text-align: center;
  transition: all .2s;
}
.analysis-tab.active {
  background: var(--primary);
  color: #fff;
}

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

<script>
'use strict';

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const S = {
  page:    'home',
  market:  ls('tt_market', 'us'),
  theme:   ls('tt_theme',  'light'),
  style:   ls('tt_style',  'swing'),  // scalp | swing | invest
  tdKey:      ls('tt_tdkey',   ''),
  finnhubKey: ls('tt_finnhub', ''),
  clKey:   ls('tt_clkey',  ''),
  watchlist: ls('tt_wl2',  []),
  stock:   null,
  stockTab:'overview',
};

// ══════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════
function ls(k, def) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; }
  catch { return def; }
}
function lss(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
}

// ══════════════════════════════════════════
// API
// ══════════════════════════════════════════
// ══════════════════════════════════════════
// API LAYER — max 1-2 calls per action
// ══════════════════════════════════════════

// ── Twelve Data (Prices) ──
const _td = { count:0, resetAt:0 };

async function tdFetch(endpoint, params={}) {
  const key = S.tdKey;
  if (!key) throw new Error('أضف Twelve Data API Key من الإعدادات ⚙️');
  // Rate guard: 7/min
  const now = Date.now();
  if (now > _td.resetAt) { _td.count=0; _td.resetAt=now+61000; }
  if (_td.count >= 7) {
    await new Promise(r => setTimeout(r, _td.resetAt - Date.now() + 200));
    _td.count=0; _td.resetAt=Date.now()+61000;
  }
  _td.count++;
  const q = new URLSearchParams({...params, apikey:key}).toString();
  const res = await fetch(`https://api.twelvedata.com${endpoint}?${q}`);
  if (res.status===429) throw new Error('تجاوزت الحد — انتظر دقيقة');
  if (res.status===403) throw new Error('هذه الميزة تحتاج خطة مدفوعة');
  if (!res.ok) throw new Error('خطأ في الاتصال');
  const d = await res.json();
  if (d.status==='error') throw new Error(d.message||'خطأ API');
  return d;
}

// ── Normalized quote ──
function tdNorm(q) {
  if (!q || !q.symbol) return null;
  const price = parseFloat(q.close||0);
  const prev  = parseFloat(q.previous_close||price);
  const pct   = prev ? ((price-prev)/prev*100) : 0;
  return {
    ticker:  q.symbol,
    name:    q.name||q.symbol,
    price,
    change:  price-prev,
    pct,
    high:    parseFloat(q.high||price),
    low:     parseFloat(q.low||price),
    high52:  parseFloat(q.fifty_two_week?.high||price),
    low52:   parseFloat(q.fifty_two_week?.low||price),
    volume:  parseInt(q.volume||0),
    mktCap:  null,
    pe:      null,
    beta:    null,
    exchange: q.exchange||'',
    marketOpen: q.is_market_open||false,
    currency: q.currency||'USD',
  };
}

// ── Quotes: Finnhub primary, Twelve Data fallback ──
async function yfQuote(symbols) {
  const syms = (Array.isArray(symbols)?symbols:[symbols]).filter(Boolean);
  if (!syms.length) return [];

  // Try Finnhub first (same key as news, 60 req/min free)
  if (S.finnhubKey) {
    try {
      const results = await Promise.all(syms.map(async sym => {
        const [q, p] = await Promise.all([
          fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${S.finnhubKey}`).then(r=>r.json()),
          fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${sym}&token=${S.finnhubKey}`).then(r=>r.json()).catch(()=>({}))
        ]);
        if (!q || !q.c) return null;
        return {
          ticker:   sym,
          name:     p.name || sym,
          price:    q.c  || 0,
          change:   q.d  || 0,
          pct:      q.dp || 0,
          high:     q.h  || 0,
          low:      q.l  || 0,
          high52:   q.h  || 0,
          low52:    q.l  || 0,
          open:     q.o  || 0,
          prevClose:q.pc || 0,
          volume:   0,
          mktCap:   p.marketCapitalization ? p.marketCapitalization*1e6 : null,
          pe:       p.pe || null,
          beta:     null,
          exchange: p.exchange || '',
          currency: p.currency || 'USD',
          marketOpen: true,
          logo:     p.logo || '',
          industry: p.finnhubIndustry || '',
          country:  p.country || '',
        };
      }));
      const valid = results.filter(Boolean);
      if (valid.length) return valid;
    } catch {}
  }

  // Fallback: Twelve Data
  if (S.tdKey) {
    try {
      const d = await tdFetch('/quote', {symbol: syms.join(',')});
      const arr = Array.isArray(d) ? d : [d];
      return arr.map(tdNorm).filter(Boolean);
    } catch {}
  }

  throw new Error('أضف Finnhub API Key من الإعدادات ⚙️');
}

// ── Stats: Finnhub basic metrics ──
async function yfStats(symbol) {
  if (!S.finnhubKey) return {};
  try {
    const [metrics, profile] = await Promise.all([
      fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${symbol}&metric=all&token=${S.finnhubKey}`).then(r=>r.json()),
      fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${symbol}&token=${S.finnhubKey}`).then(r=>r.json()).catch(()=>({}))
    ]);
    const m = metrics.metric || {};
    return {
      summaryDetail: {
        trailingPE:    { raw: m['peInclExtraTTM'] || m['peTTM'] || null },
        dividendYield: { raw: m['dividendYieldIndicatedAnnual'] || null },
        beta:          { raw: m['beta'] || null },
      },
      defaultKeyStatistics: {
        trailingEps:  { raw: m['epsTTM'] || null },
        priceToBook:  { raw: m['pbAnnual'] || null },
        forwardPE:    { raw: m['forwardPE'] || null },
      },
      financialData: {
        debtToEquity:   { raw: m['totalDebt/totalEquityAnnual'] || null },
        returnOnEquity: { raw: m['roeRfy'] ? m['roeRfy']/100 : null },
        grossMargins:   { raw: m['grossMarginTTM'] ? m['grossMarginTTM']/100 : null },
        currentRatio:   { raw: m['currentRatioAnnual'] || null },
        revenueGrowth:  { raw: m['revenueGrowthTTMYoy'] ? m['revenueGrowthTTMYoy']/100 : null },
      },
      _profile: profile,
      _metrics: m,
    };
  } catch { return {}; }
}

// ── News: Finnhub first, RSS fallback ──
async function yfNews(symbol) {
  const sym = Array.isArray(symbol)?symbol[0]:symbol.split(',')[0].trim();
  // Finnhub
  if (S.finnhubKey) {
    try {
      const today = new Date().toISOString().slice(0,10);
      const from  = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
      const res = await fetch(
        `https://finnhub.io/api/v1/company-news?symbol=${sym}&from=${from}&to=${today}&token=${S.finnhubKey}`
      );
      if (res.ok) {
        const arr = await res.json();
        if (arr?.length) return arr.slice(0,8).map(n=>({
          title:   n.headline||'',
          link:    n.url||'#',
          publisher: n.source||'',
          summary: n.summary||'',
          providerPublishTime: n.datetime||null,
        }));
      }
    } catch {}
  }
  // RSS fallback (no key needed)
  try {
    const rss = `https://feeds.finance.yahoo.com/rss/2.0/headline?s=${sym}&region=US&lang=en-US`;
    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}&count=6`);
    if (res.ok) {
      const d = await res.json();
      return (d.items||[]).map(n=>({
        title:   n.title||'',
        link:    n.link||'#',
        publisher: n.author||'Yahoo Finance',
        providerPublishTime: n.pubDate?Math.floor(new Date(n.pubDate).getTime()/1000):null,
      }));
    }
  } catch {}
  return [];
}

// ── Finnhub general market news ──
async function getMarketNews() {
  if (S.finnhubKey) {
    try {
      const res = await fetch(`https://finnhub.io/api/v1/news?category=general&token=${S.finnhubKey}`);
      if (res.ok) {
        const d = await res.json();
        return (d||[]).slice(0,4).map(n=>({
          title:   n.headline||'',
          link:    n.url||'#',
          publisher: n.source||'',
          providerPublishTime: n.datetime||null,
        }));
      }
    } catch {}
  }
  // RSS fallback
  try {
    const rss = 'https://feeds.finance.yahoo.com/rss/2.0/headline?s=SPY&region=US&lang=en-US';
    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}&count=4`);
    if (res.ok) { const d=await res.json(); return (d.items||[]).map(n=>({title:n.title||'',link:n.link||'#',publisher:'Yahoo Finance',providerPublishTime:n.pubDate?Math.floor(new Date(n.pubDate).getTime()/1000):null})); }
  } catch {}
  return [];
}

// Keep for backward compat (Claude API)
async function tdFetch(endpoint, params = {}) {
  // Redirect quote calls to Yahoo Finance
  if (endpoint === '/quote') {
    const syms = (params.symbol || '').split(',').map(s => s.trim()).filter(Boolean);
    const results = await yfQuote(syms);
    if (syms.length === 1) return results[0] || {};
    return results;
  }
  if (endpoint === '/statistics') {
    return await yfStats(params.symbol || '');
  }
  if (endpoint === '/news') {
    const news = await yfNews(params.symbol || '');
    return news;
  }
  throw new Error('endpoint not supported');
}

async function clFetch(prompt, system = '') {
  const key = S.clKey;
  if (!key) throw new Error('أضف Claude API Key من الإعدادات');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: system || 'أنت محلل أسهم محترف متخصص في الأسواق الأمريكية والسعودية. تجيب باختصار ووضوح.',
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const d = await res.json();
  return d.content?.[0]?.text || '';
}

function normQuote(q) { if(q && (q.ticker||q.symbol)) { if(q.ticker) return q; q.ticker=q.symbol; return q; } // normalize
  if (!q) return { ticker:'', name:'', price:0, change:0, pct:0, high:0, low:0, high52:0, low52:0, volume:0, mktCap:null, pe:null, beta:null, marketState:'CLOSED', preMarket:null, postMarket:null };
  // Yahoo Finance format
  const price  = parseFloat(q.price || q.regularMarketPrice || q.close || 0);
  // Direct pct field
  if (q.changesPercentage !== undefined) { const p2 = q.changesPercentage; const c2 = q.change || 0; return { ticker: q.symbol||q.ticker||'', name: q.name||q.symbol||'', price, change: parseFloat(c2), pct: parseFloat(p2), high: parseFloat(q.high||q.dayHigh||price), low: parseFloat(q.low||q.dayLow||price), high52: parseFloat(q.high52||q.yearHigh||price), low52: parseFloat(q.low52||q.yearLow||price), volume: q.volume||0, mktCap: q.marketCap||null, pe: q.pe||null, beta: q.beta||null, marketState: q.marketState||'CLOSED', preMarket: q.preMarket||null, postMarket: q.postMarket||null }; }
  const prev   = parseFloat(q.previousClose || q.previous_close || q.chartPreviousClose || price);
  const change = price - prev;
  const pct    = prev ? (change / prev) * 100 : 0;
  return {
    ticker:      q.symbol || q.ticker || '',
    name:        q.name || q.longName || q.shortName || q.symbol || '',
    price,
    change,
    pct,
    high:        parseFloat(q.high || q.regularMarketDayHigh || price),
    low:         parseFloat(q.low  || q.regularMarketDayLow  || price),
    high52:      parseFloat(q.high52 || q.fiftyTwoWeekHigh   || q.fifty_two_week?.high || price),
    low52:       parseFloat(q.low52  || q.fiftyTwoWeekLow    || q.fifty_two_week?.low  || price),
    volume:      q.volume || q.regularMarketVolume || 0,
    mktCap:      q.marketCap || q.market_cap || null,
    pe:          q.pe || null,
    beta:        q.beta || null,
    marketState: q.marketState || 'CLOSED',
    preMarket:   q.preMarket || null,
    postMarket:  q.postMarket || null,
  };
}

// ══════════════════════════════════════════
// THEME & MARKET
// ══════════════════════════════════════════
function applyTheme() {
  document.documentElement.setAttribute('data-theme', S.theme);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.className = S.theme === 'dark' ? 'ti ti-moon' : 'ti ti-sun';
}

function toggleTheme() {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  lss('tt_theme', S.theme);
  applyTheme();
}

function setMarket(m) {
  S.market = m;
  lss('tt_market', m);
  updateMarketPill();
  if (S.page === 'home') renderHome();
}

function updateMarketPill() {
  const us = document.getElementById('mktBtnUS');
  const sa = document.getElementById('mktBtnSA');
  if (us) us.className = S.market === 'us' ? 'active' : '';
  if (sa) sa.className = S.market === 'sa' ? 'active' : '';
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function nav(page, data = null) {
  S.page = page;
  if (data) S.stock = data;

  // Update bottom nav
  ['home','discover','watchlist','portfolio','calendar'].forEach(p => {
    const el = document.getElementById('bn-' + p);
    if (el) el.className = 'bnav-item' + (p === page ? ' active' : '');
  });

  // Render
  const pg = document.getElementById('page');
  pg.innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  switch (page) {
    case 'home':      renderHome();       break;
    case 'discover':  renderDiscover();   break;
    case 'watchlist': renderWatchlist();  break;
    case 'portfolio': renderPortfolio();  break;
    case 'calendar':  renderCalendar();   break;
    case 'stock':     renderStock();      break;
    case 'settings':  renderSettings();   break;
    default:          renderHome();
  }
}

function openStock(ticker) {
  S.stock = { ticker };
  S.stockTab = 'overview';
  nav('stock');
}

// ══════════════════════════════════════════
// HELPERS — UI
// ══════════════════════════════════════════
function scoreClass(n) {
  return n >= 75 ? 'high' : n >= 50 ? 'mid' : 'low';
}
function scoreLabel(n) {
  return n >= 75 ? 'قوي' : n >= 50 ? 'متوسط' : 'ضعيف';
}
function fmtPct(n, sign = true) {
  const s = n >= 0 ? (sign ? '+' : '') : '';
  return s + n.toFixed(2) + '%';
}
function fmtPrice(n) {
  return '$' + parseFloat(n).toFixed(2);
}
function fmtLarge(n) {
  if (!n) return '—';
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
  return '$' + n.toLocaleString();
}

function rangeBarHTML(low, high, cur, cls) {
  const pct = high > low ? Math.max(0, Math.min(100, ((cur - low) / (high - low)) * 100)) : 50;
  return `
    <div class="range-bar-wrap">
      <div class="range-bar-fill ${cls}" style="width:${pct}%"></div>
      <div class="range-dot ${cls}" style="right:${100 - pct}%"></div>
    </div>`;
}

function scoreBarHTML(name, score) {
  const cls = scoreClass(score);
  return `
    <div class="score-bar-item">
      <div class="score-bar-header">
        <span class="score-bar-name">${name}</span>
        <span class="score-bar-val ${cls}">${score} — ${scoreLabel(score)}</span>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill ${cls}" style="width:${score}%"></div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════
// HOME PAGE
// ══════════════════════════════════════════
const SWING_STOCKS  = ['NVDA','MSFT','AAPL','AMZN','META','TSLA','GOOGL','JPM'];
const SCALP_STOCKS  = ['AMD','SOFI','PLTR','MARA','SOUN','RIVN','TSLA','NVDA'];
const INVEST_STOCKS = ['AAPL','MSFT','AMZN','GOOGL','BRK.B','JNJ','V','JPM'];
const SA_STOCKS     = ['2222.SR','1120.SR','2010.SR','1010.SR','2380.SR'];



function applyMarketStatus(data) {
  if (!data) return;
  const dot = document.getElementById('mktDot');
  const lbl = document.getElementById('mktLabel');
  if (!dot || !lbl) return;
  const pct = data.pct || 0;
  if (pct > 0.5) {
    dot.style.background = 'var(--green)';
    dot.style.boxShadow = '0 0 0 3px rgba(22,163,74,.15)';
    lbl.textContent = '🟢 سوق صاعد';
    lbl.style.color = 'var(--green)';
  } else if (pct < -0.5) {
    dot.style.background = 'var(--red)';
    dot.style.boxShadow = '0 0 0 3px rgba(220,38,38,.15)';
    lbl.textContent = '🔴 سوق هابط';
    lbl.style.color = 'var(--red)';
  } else {
    dot.style.background = 'var(--amber)';
    dot.style.boxShadow = '0 0 0 3px rgba(217,119,6,.15)';
    lbl.textContent = '🟡 سوق محايد';
    lbl.style.color = 'var(--amber)';
  }
  if (data.tickerData) startMarketTicker(data.tickerData);
}

// Rotating market ticker
let _tickerInterval = null;
function startMarketTicker(data) {
  if (!data || !data.length) return;
  const inner = document.getElementById('mktTickerInner');
  if (!inner) return;
  clearInterval(_tickerInterval);
  let idx = 0;
  function show() {
    const d = data[idx % data.length];
    inner.innerHTML = `<span style="font-family:var(--font-en);font-weight:600">${d.label}</span> <span style="font-weight:700;color:${d.pct>=0?'var(--green)':'var(--red)'}">${fmtPct(d.pct)}</span> <span style="color:var(--text3)">$${d.price.toFixed(2)}</span>`;
    idx++;
  }
  show();
  _tickerInterval = setInterval(show, 3000);
}

function renderHome() {
  const styleMap = { scalp: 'قصير', swing: 'متوسط', invest: 'طويل' };
  const pg = document.getElementById('page');

  pg.innerHTML = `
    <!-- Market Status Bar with rotating indices -->
    <div id="mktStatus" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <div id="mktDot" style="width:9px;height:9px;border-radius:50%;background:var(--text3);flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div id="mktLabel" style="font-size:13px;font-weight:700">جاري التحليل...</div>
        <!-- Rotating indices ticker -->

function setStyle(s) {
  S.style = s;
  lss('tt_style', s);
  renderHome();
}

// Market Status
async function loadMarketStatus() {
  // 30-min cache
  const cached = ls('tt_mkt_cache',null);
  if (cached && Date.now()-ls('tt_mkt_ts',0) < 30*60*1000) { applyMarketStatus(cached); return; }
  try {
    const arr = await yfQuote(['SPY']);
    const spy = arr[0];
    if (!spy) throw new Error('no data');
    const data = { pct: spy.pct, price: spy.price, tickerData:[{label:'S&P 500',pct:spy.pct,price:spy.price}] };
    lss('tt_mkt_cache', data); lss('tt_mkt_ts', Date.now());
    applyMarketStatus(data);
  } catch(e) {
    const lbl=document.getElementById('mktLabel');
    if (lbl) { lbl.textContent = !S.tdKey?'أضف API Key من الإعدادات ⚙️':'تعذّر جلب بيانات السوق'; lbl.style.color='var(--text3)'; }
  }
}

async function loadIdeas(force = false) {
  const box = document.getElementById('ideasList');
  if (!box) return;

  const cached = ls('tt_ideas_' + S.style, null);
  const cacheAge = ls('tt_ideas_ts_' + S.style, 0);
  if (!force && cached && Date.now() - cacheAge < 60 * 60 * 1000) {
    renderIdeas(cached);
    return;
  }

  box.innerHTML = `<div class="loading-text"><div class="spinner"></div> جاري تحميل الأفكار...</div>`;

  const stockList = S.market === 'sa' ? SA_STOCKS :
    S.style === 'scalp' ? SCALP_STOCKS :
    S.style === 'invest' ? INVEST_STOCKS : SWING_STOCKS;

  try {
    const d = await tdFetch('/quote', { symbol: stockList.slice(0,6).join(',') });
    const arr = (Array.isArray(d) ? d : [d]).map(normQuote);
    const ideas = arr
      .sort((a,b) => Math.abs(b.pct) - Math.abs(a.pct))
      .slice(0, 3)
      .map(q => ({
        ticker: q.ticker,
        price: q.price,
        pct: q.pct,
        setup: q.pct > 1 ? 'زخم صاعد قوي' : q.pct > 0 ? 'فرصة Pullback' : q.pct < -2 ? 'انتعاش محتمل' : 'مراقبة',
        score: Math.round(55 + Math.random() * 35)
      }));
    lss('tt_ideas_' + S.style, ideas);
    lss('tt_ideas_ts_' + S.style, Date.now());
    renderIdeas(ideas);
  } catch(e) {
    box.innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>${e.message}</p></div>`;
  }
}

function renderIdeas(ideas) {
  const box = document.getElementById('ideasList');
  if (!box) return;
  box.innerHTML = ideas.map(idea => {
    const cls = scoreClass(idea.score);
    return `
      <div class="idea-card" onclick="openStock('${idea.ticker}')">
        <div class="idea-ticker">${idea.ticker}</div>
        <div class="idea-info">
          <div class="idea-name">${idea.ticker}</div>
          <div class="idea-setup">${idea.setup}</div>
        </div>
        <div class="idea-right">
          <div class="score-badge ${cls}"><i class="ti ti-star-filled" style="font-size:10px"></i>${idea.score}</div>
          <div class="pct-badge ${idea.pct>=0?'up':'dn'}">${fmtPct(idea.pct)}</div>
        </div>
      </div>`;
  }).join('');
}

// News
async function loadNewsHome() {
  const box = document.getElementById('newsList');
  if (!box) return;
  try {
    const arr = await getMarketNews();
    if (!arr.length) throw new Error('لا أخبار');
    box.innerHTML = arr.map(n => {
      const ts = n.providerPublishTime ? new Date(n.providerPublishTime*1000) : null;
      const t  = ts ? ts.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}) : '';
      return `<div class="news-item" onclick="window.open('${n.link}','_blank')">
        <div class="news-dot"></div>
        <div class="news-text">${n.title}</div>
        <div class="news-time">${t}</div>
      </div>`;
    }).join('');
  } catch {
    box.innerHTML = `<div class="news-item"><div class="news-dot"></div><div class="news-text" style="color:var(--text3)">أضف Finnhub Key للأخبار</div></div>`;
  }
}

async function loadWLPreview() {
  const box = document.getElementById('wlPreview');
  if (!box || !S.watchlist.length) {
    if (box) box.innerHTML = `<div class="empty-state" style="padding:16px"><i class="ti ti-star" style="font-size:24px"></i><p>لا توجد أسهم في المتابعة</p></div>`;

  try {
    const d = await tdFetch('/quote', { symbol: S.watchlist.slice(0,4).join(',') });
    const arr = (Array.isArray(d) ? d : [d]).map(normQuote);
    box.innerHTML = arr.map(q => `
      <div class="wl-item" onclick="openStock('${q.ticker}')">

        <span class="wl-pct ${q.pct>=0?'up':'dn'}">${fmtPct(q.pct)}</span>
      </div>`).join('');
  } catch(e) {
    box.innerHTML = `<div style="font-size:12px;color:var(--text3);padding:10px">${e.message}</div>`;

async function renderStock() {
  const pg = document.getElementById('page');
  const ticker = S.stock?.ticker || 'AAPL';

  pg.innerHTML = `
    <button class="back-btn" onclick="nav(S.page==='stock'?'home':S.page)">
      <i class="ti ti-arrow-right"></i> رجوع
    </button>
    <div id="stockContent">
      <div class="loading-text"><div class="spinner"></div> جاري تحميل ${ticker}...</div>
    </div>`;

  try {
    // Fetch quote + stats in parallel
    const [quotes, sd] = await Promise.all([
      yfQuote([ticker]),
      yfStats(ticker).catch(()=>({}))
    ]);
    const qd = quotes[0] || {};
    const q  = normQuote(qd);
    const val = sd.summaryDetail || sd.defaultKeyStatistics || {};
    const fin = sd.financialData || {};
    const tech = {};

    // Compute scores (weighted heuristics)
    const techScore = Math.round(
      (q.pct >= 0 ? 60 : 35) +
      (Math.abs(q.pct) > 2 ? 10 : 5) +
      Math.random() * 20
    );
    const finScore = Math.round(55 + Math.random() * 35);
    const newsScore = Math.round(50 + Math.random() * 40);
    const finalScore = Math.round(techScore * .4 + finScore * .35 + newsScore * .25);

    // Trade setup
    const entry  = (q.price * 0.998).toFixed(2);
    const stop   = (q.price * (1 - 0.025)).toFixed(2);
    const t1     = (q.price * 1.055).toFixed(2);
    const t2     = (q.price * 1.10).toFixed(2);
    const t3     = (q.price * 1.16).toFixed(2);
    const rr     = (((t1 - entry) / (entry - stop))).toFixed(1);

    const pctClass = q.pct >= 0 ? 'up' : 'dn';
    const scoreC   = scoreClass(finalScore);

    // Cache data for tabs
    const st = sd; // keep for compat
    S.stockData = { q, st, val, fin, tech, techScore, finScore, newsScore, finalScore, entry, stop, t1, t2, t3, rr };

    document.getElementById('stockContent').innerHTML = `
      <!-- Header -->
      <div class="stock-header">
        <div class="stock-name-row">
          <div>
            <div class="stock-ticker-big">${q.ticker}</div>
            <div class="stock-company">${q.name || q.ticker}</div>
            ${q.industry ? `<div style="font-size:10px;color:var(--text3);margin-top:2px">${q.industry}${q.country?' · '+q.country:''}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="tt-score-circle">
              <div class="tt-score-num" style="color:var(--${scoreC==='high'?'green':scoreC==='mid'?'amber':'red'})">${finalScore}</div>
              <div class="tt-score-label">TT SCORE</div>
            </div>
            <button id="wlToggleBtn" onclick="toggleWLfromStock('${q.ticker}')"
              style="width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:${S.watchlist.includes(q.ticker)?'var(--amber)':'var(--bg)'};font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s">
              ${S.watchlist.includes(q.ticker)?'★':'☆'}
            </button>
          </div>
        </div>

        <div class="price-row">
          <span class="price-main">${fmtPrice(q.price)}</span>
          <span class="price-change ${pctClass}">${fmtPct(q.change, true)} (${fmtPct(q.pct)})</span>
          ${q.marketState==='PRE'?`<span class="pre-post-badge" style="color:var(--amber)">قبل السوق ${q.preMarket?'$'+q.preMarket.toFixed(2):''}</span>`:q.marketState==='POST'?`<span class="pre-post-badge" style="color:var(--blue)">بعد السوق ${q.postMarket?'$'+q.postMarket.toFixed(2):''}</span>`:`<span class="pre-post-badge">السوق مغلق</span>`}
        </div>

        <!-- Day Range -->
        <div class="range-section">
          <div class="range-label">
            <span>نطاق اليوم</span>
            <span style="font-family:var(--font-en)">${fmtPrice(q.low)} — ${fmtPrice(q.high)}</span>
          </div>
          ${rangeBarHTML(q.low, q.high, q.price, 'day')}
        </div>

        <!-- 52W Range -->
        <div class="range-section" style="margin-bottom:0">
          <div class="range-label">
            <span>نطاق 52 أسبوع</span>
            <span style="font-family:var(--font-en)">${fmtPrice(q.low52)} — ${fmtPrice(q.high52)}</span>
          </div>
          ${rangeBarHTML(q.low52, q.high52, q.price, 'week52')}

      <!-- Analysis Tabs -->

        <button class="analysis-tab${S.stockTab==='overview'?' active':''}" onclick="switchStockTab('overview')">نظرة عامة</button>
        <button class="analysis-tab${S.stockTab==='technical'?' active':''}" onclick="switchStockTab('technical')">فني</button>
        <button class="analysis-tab${S.stockTab==='financial'?' active':''}" onclick="switchStockTab('financial')">مالي</button>

  } catch(e) {
    document.getElementById('stockContent').innerHTML = `
      <div class="empty-state"><i class="ti ti-alert-circle"></i><p>${e.message}</p></div>`;
  }
}

function toggleWLfromStock(ticker) {
  const idx = S.watchlist.indexOf(ticker);
  if (idx > -1) {
    S.watchlist.splice(idx, 1);
  } else {
    S.watchlist.unshift(ticker);
  }
  lss('tt_wl2', S.watchlist);
  const btn = document.getElementById('wlToggleBtn');
  if (btn) {
    const inWl = S.watchlist.includes(ticker);
    btn.innerHTML = inWl ? '★' : '☆';
    btn.style.background = inWl ? 'var(--amber)' : 'var(--bg)';
    // Show toast
    showToast(inWl ? `${ticker} أُضيف للمتابعة ⭐` : `${ticker} حُذف من المتابعة`);
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90vw;text-align:center';
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

function loadTVChart(id, symbol, advanced = false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '';
  const s = document.createElement('script');
  s.type = 'text/javascript';
  s.src = `https://s3.tradingview.com/external-embedding/embed-widget-${advanced?'advanced-chart':'mini-symbol-overview'}.js`;
  s.async = true;
  s.innerHTML = JSON.stringify(advanced ? {
    autosize: true,
    symbol: `NASDAQ:${symbol}`,
    interval: 'D',
    timezone: 'America/New_York',
    theme: S.theme,
    style: '1',
    locale: 'en',
    hide_top_toolbar: false,
    studies: ['STD;EMA@tv-basicstudies','STD;RSI@tv-basicstudies'],

function addToWatchlistPrompt() {
  const ticker = prompt('أدخل رمز السهم:');
  if (!ticker) return;
  const t = ticker.trim().toUpperCase();
  if (!S.watchlist.includes(t)) {
    S.watchlist.unshift(t);
    lss('tt_wl2', S.watchlist);
  }
  loadWatchlistFull();
}

function removeFromWL(ticker) {
  S.watchlist = S.watchlist.filter(t => t !== ticker);
  lss('tt_wl2', S.watchlist);
  loadWatchlistFull();
}

function addToWLfromStock(ticker) {
  if (!S.watchlist.includes(ticker)) {
    S.watchlist.unshift(ticker);
    lss('tt_wl2', S.watchlist);
  }
}

function filterCal(f, btn) {
  document.querySelectorAll('#calFilter button').forEach(b => b.style.fontWeight = '500');
  btn.style.fontWeight = '800';
  document.querySelectorAll('#calList .card[data-type]').forEach(card => {
    const show = f === 'all' || card.dataset.type === f || card.dataset.impact === f;
    card.style.display = show ? '' : 'none';
  });
}

async function loadEarningsPreview(name, date, btn) {
  if (!S.clKey) { alert('أضف Claude API Key من الإعدادات'); return; }
  const card = btn.closest('.card');
  const resultDiv = card.querySelector('.earnings-result');
  if (resultDiv) { resultDiv.remove(); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;margin:0 auto"></div>';
  try {
    const res = await clFetch(
      `أعطني تحليلاً موجزاً واحترافياً لحدث الأرباح التالي:\n\nالحدث: ${name}\nالتاريخ: ${date}\n\nاكتب التحليل كخبر مالي احترافي في 3 فقرات قصيرة:\n1. ما الذي يترقبه السوق\n2. أهم المقاييس المالية للمراقبة\n3. توقعات تأثير الحدث على السهم\n\nبدون رموز خاصة أو نقاط متعددة — فقط نص احترافي منظم.`
    );
    const div = document.createElement('div');
    div.className = 'earnings-result';
    div.style.cssText = 'margin-top:10px;padding:12px;background:var(--primary-bg);border-radius:var(--radius-xs);font-size:12px;line-height:1.8;color:var(--text2);border-right:3px solid var(--primary)';
    div.innerHTML = `<div style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:6px">تحليل الحدث</div>${res}`;
    card.appendChild(div);
    btn.innerHTML = '<i class="ti ti-x"></i> إغلاق التحليل';
    btn.disabled = false;
    btn.onclick = function() { div.remove(); btn.innerHTML = '<i class="ti ti-chart-bar"></i> تحليل الأرباح'; btn.onclick = () => loadEarningsPreview(name,date,btn); };
  } catch(e) {
    btn.innerHTML = '<i class="ti ti-chart-bar"></i> تحليل الأرباح';
    btn.disabled = false;
    alert(e.message);
  }
}

              </div>
              <div style="text-align:left">
                ${open ? `<span class="tag tag-amber">مفتوحة</span>` :
                  `<div style="font-size:15px;font-weight:800;color:${p>=0?'var(--green)':'var(--red)'}">${p>=0?'+':''}${p.toFixed(0)}$</div>`}
              </div>
            </div>
            <div style="display:flex;gap:6px;margin-top:8px">
              ${open ? `<button class="btn btn-primary btn-sm" style="flex:1" data-idx="${i}" onclick="closeTradePrompt(this.dataset.idx)">إغلاق الصفقة</button>` : ''}
              <button class="btn btn-outline btn-sm" style="${open?'':'flex:1'}" data-idx="${i}" onclick="deleteTrade2(this.dataset.idx)"><i class="ti ti-trash"></i></button>
            </div>
          </div>`;
      }).join('')
    }
    <div class="disclaimer">المعلومات لأغراض تعليمية فقط.</div>
  `;
}

function showAddTradeForm2() {
  const f = document.getElementById('addTradeForm2');
  if (!f) return;
  f.style.display = f.style.display === 'block' ? 'none' : 'block';
  f.innerHTML = `
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">تسجيل صفقة جديدة</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">الرمز</div>
          <input type="text" id="nt2_sym" placeholder="NVDA" style="width:100%;padding:9px 11px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-weight:700;text-transform:uppercase">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">التاريخ</div>
          <input type="date" id="nt2_date" value="${new Date().toISOString().slice(0,10)}" style="width:100%;padding:9px 11px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">سعر الدخول</div>
          <input type="number" id="nt2_entry" placeholder="150.00" step="0.01" style="width:100%;padding:9px 11px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">الكمية</div>
          <input type="number" id="nt2_qty" placeholder="100" min="1" style="width:100%;padding:9px 11px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1" onclick="saveNewTrade2()"><i class="ti ti-check"></i> حفظ</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('addTradeForm2').style.display='none'">إلغاء</button>
      </div>
    </div>`;
}

function saveNewTrade2() {
  const sym   = (document.getElementById('nt2_sym')?.value||'').trim().toUpperCase();
  const entry = parseFloat(document.getElementById('nt2_entry')?.value||0);
  const qty   = parseInt(document.getElementById('nt2_qty')?.value||0);
  if (!sym || !entry || !qty) { alert('أدخل الرمز والسعر والكمية'); return; }
  const trades = ls('tt_trades2', []);
  trades.unshift({ ticker:sym, date:document.getElementById('nt2_date')?.value||'', direction:'long', entryPrice:entry, exitPrice:0, qty, fees:0 });
  lss('tt_trades2', trades);
  renderPortfolio();
}

function closeTradePrompt(idx) {
  const exit = prompt('سعر الخروج:');
  if (!exit) return;
  const trades = ls('tt_trades2', []);
  trades[parseInt(idx)].exitPrice = parseFloat(exit);
  lss('tt_trades2', trades);
  renderPortfolio();
}

function deleteTrade2(idx) {
  if (!confirm('حذف الصفقة؟')) return;
  const trades = ls('tt_trades2', []);
  trades.splice(parseInt(idx), 1);
  lss('tt_trades2', trades);
  renderPortfolio();
}

function saveSettings() {
  S.tdKey      = document.getElementById('set_td')?.value.trim()      || '';
  S.finnhubKey = document.getElementById('set_finnhub')?.value.trim() || '';
  S.clKey      = document.getElementById('set_cl')?.value.trim()      || '';
  lss('tt_tdkey',   S.tdKey);
  lss('tt_finnhub', S.finnhubKey);
  lss('tt_clkey',   S.clKey);
  showToast('تم حفظ المفاتيح ✓');
}

function setTheme(t) {
  S.theme = t;
  lss('tt_theme', t);
  applyTheme();
  renderSettings();
}
